<!DOCTYPE html>
<html>
<head>
    <title>For My Sayang ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff4e78, #ff8eb3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 50px;
            text-shadow: 0 0 20px white;
            animation: glow 2s infinite alternate;
        }

        p {
            color: white;
            font-size: 22px;
            margin-top: 15px;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4e78;
            font-size: 18px;
            cursor: pointer;
        }

        .heart {
            position: absolute;
            font-size: 25px;
            animation: float 5s linear infinite;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px white;
            }
            to {
                text-shadow: 0 0 30px red;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div>
    <h1>I LOVE YOU SAYANG ❤️</h1>
    <p>You are the best thing that ever happened to me 💕</p>
    <button onclick="playMusic()">Click Here, My Love 💖</button>
</div>

<audio id="loveSong" loop>
    <source src="love_song.mp3" type="audio/mp3">
</audio>

<script>
    function playMusic() {
        document.getElementById("loveSong").play();
    }

    function createHeart() {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
